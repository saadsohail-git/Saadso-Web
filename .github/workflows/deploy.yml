name: Deploy to VPS

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for SSR
        run: npx nuxt build

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          # Sync the built app to the server
          rsync -avz --delete \
            --exclude='content/blog' \
            -e "$SSH_CMD" \
            .output/ root@${HOST}:/var/www/saadso/

          # Sync content separately (additive, preserves server-created posts)
          rsync -avz \
            -e "$SSH_CMD" \
            content/ root@${HOST}:/var/www/saadso/content/

          # Sync package files
          rsync -avz \
            -e "$SSH_CMD" \
            package.json package-lock.json root@${HOST}:/var/www/saadso/

          # Write env file to remote
          $SSH_CMD root@${HOST} "printf 'ADMIN_PASSWORD=%s\nDATABASE_URL=%s\n' '${ADMIN_PASSWORD}' '${DATABASE_URL}' > /var/www/saadso/.env"

          # Run remote setup script
          $SSH_CMD root@${HOST} << 'ENDSSH'
            set -e

            # ── Postgres ──────────────────────────────────────────────
            if ! dpkg -l postgresql 2>/dev/null | grep -q '^ii'; then
              apt-get update -q && apt-get install -y postgresql
            fi
            systemctl is-active --quiet postgresql || systemctl start postgresql

            # Parse DB credentials from .env DATABASE_URL
            DB_URL=$(grep DATABASE_URL /var/www/saadso/.env | cut -d= -f2-)
            DB_USER=$(echo "$DB_URL" | sed 's|postgres://||' | cut -d: -f1)
            DB_PASS=$(echo "$DB_URL" | sed 's|postgres://[^:]*:||' | cut -d@ -f1)
            DB_NAME=$(echo "$DB_URL" | rev | cut -d/ -f1 | rev)

            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1 || \
              sudo -u postgres psql -c "CREATE USER $DB_USER WITH PASSWORD '$DB_PASS';"
            sudo -u postgres psql -lqt | cut -d'|' -f1 | grep -qw "$DB_NAME" || \
              sudo -u postgres psql -c "CREATE DATABASE $DB_NAME OWNER $DB_USER;"

            # ── Uploads directory (nginx-served) ──────────────────────
            mkdir -p /var/www/saadso-uploads/zikr

            # ── Nginx: add /uploads/ location block if missing ────────
            NGINX_CONF=$(find /etc/nginx/sites-enabled/ -type f | head -1)
            if [ -n "$NGINX_CONF" ] && ! grep -q 'saadso-uploads' "$NGINX_CONF"; then
              sed -i 's|location / {|location /uploads/ {\n        alias /var/www/saadso-uploads/;\n        expires 30d;\n    }\n\n    location / {|' "$NGINX_CONF"
              nginx -t && nginx -s reload
            fi

            # ── App deps + PM2 ────────────────────────────────────────
            cd /var/www/saadso
            npm ci --production 2>/dev/null || true

            command -v pm2 >/dev/null || npm install -g pm2
            pm2 describe saadso >/dev/null 2>&1 && pm2 restart saadso || pm2 start server/index.mjs --name saadso
            pm2 save
          ENDSSH
