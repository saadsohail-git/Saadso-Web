name: Deploy to VPS

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for SSR
        run: npx nuxt build

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          # Sync the built app to the server (preserve runtime-created content and uploads)
          rsync -avz --delete \
            --exclude='content/blog' \
            --exclude='content/zikr.json' \
            --exclude='public/uploads' \
            -e "$SSH_CMD" \
            .output/ root@${HOST}:/var/www/saadso/

          # Sync content separately (don't delete server-created posts or zikr entries)
          rsync -avz \
            -e "$SSH_CMD" \
            content/ root@${HOST}:/var/www/saadso/content/

          # Sync package files for any native deps
          rsync -avz \
            -e "$SSH_CMD" \
            package.json package-lock.json root@${HOST}:/var/www/saadso/

          # Install production deps, set env, restart the server
          $SSH_CMD root@${HOST} << 'REMOTE'
            cd /var/www/saadso
            npm ci --production 2>/dev/null || true
            echo "ADMIN_PASSWORD=${ADMIN_PASSWORD}" > .env

            # Install PM2 if not present
            command -v pm2 >/dev/null || npm install -g pm2

            # Start or restart the Nuxt server
            pm2 describe saadso >/dev/null 2>&1 && pm2 restart saadso || pm2 start server/index.mjs --name saadso
            pm2 save
          REMOTE
